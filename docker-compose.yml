services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    # So localhost - quem fica exposto a internet e o nginx do host (TLS com
    # o certificado wildcard existente), nao o container diretamente. Ver
    # deploy/nginx-vigiapublico.conf.
    ports:
      - "127.0.0.1:8501:8501"
