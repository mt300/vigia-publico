# Server block pro dashboard publico (Vigia Publico), usando o certificado
# wildcard existente de *.mwebs.com.br - nao precisa de certbot/Caddy
# separado pra esse subdominio, so reaproveitar o cert.
#
# Instalar na VPS:
#   sudo cp deploy/nginx-vigiapublico.conf /etc/nginx/sites-available/vigiapublico.mwebs.com.br
#   sudo ln -s /etc/nginx/sites-available/vigiapublico.mwebs.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pressupoe que o container ja esta rodando com `docker compose up -d`
# (ver docker-compose.yml - expoe so em 127.0.0.1:8501, o nginx e quem fica
# exposto a internet).
#
# AJUSTE os caminhos de ssl_certificate/ssl_certificate_key abaixo pro que
# seu setup realmente usa (varia se e certbot padrao, DNS-01 pra wildcard,
# etc - normalmente algo como /etc/letsencrypt/live/mwebs.com.br/*.pem, mas
# confirme o caminho real no seu servidor antes de ativar).

server {
    listen 80;
    listen [::]:80;
    server_name vigiapublico.mwebs.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vigiapublico.mwebs.com.br;

    ssl_certificate     /etc/letsencrypt/live/mwebs.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mwebs.com.br/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:8501;

        # Streamlit usa WebSocket (_stcore/stream) pra manter a sessao viva -
        # sem isso a pagina carrega mas widgets/filtros nao respondem.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Sessao do Streamlit fica aberta (WebSocket) - timeout curto demais
        # derruba o usuario no meio de uma interacao.
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
