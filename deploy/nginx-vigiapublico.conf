# Server block pro dashboard publico (Vigia Publico) - mesmo padrao dos
# outros sites da VPS (ex: /etc/nginx/sites-enabled/woot), so trocando
# server_name e a porta pro container (127.0.0.1:8501, ver docker-compose.yml).
#
# Instalar na VPS:
#   sudo cp deploy/nginx-vigiapublico.conf /etc/nginx/sites-available/vigiapublico.mwebs.com.br
#   sudo ln -s /etc/nginx/sites-available/vigiapublico.mwebs.com.br /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Pressupoe que o container ja esta rodando com `docker compose up -d`.

server {
    listen 80;
    server_name vigiapublico.mwebs.com.br;

    # Redireciona tudo pra HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vigiapublico.mwebs.com.br;

    ssl_certificate /etc/nginx/ssl/n8n.crt;
    ssl_certificate_key /etc/nginx/ssl/n8n.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8501;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_set_header X-Forwarded-Proto https;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Streamlit mantem uma sessao de WebSocket aberta (_stcore/stream)
        # enquanto a aba do navegador estiver aberta - sem esse timeout mais
        # alto (o default do nginx e 60s), o proxy derruba a conexao no meio
        # de uma sessao ociosa e o dashboard "trava" ate o usuario recarregar.
        proxy_read_timeout 86400;
    }
}
